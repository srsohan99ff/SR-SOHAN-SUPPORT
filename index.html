<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᏚR SOHAN - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #3b82f6;
            --dark-bg: #020617;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Rajdhani', sans-serif;
            color: #f9fafb;
        }
        
        .main-container { width: 100%; max-width: 400px; text-align: center; }

        .main-logo {
            width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px;
            border: 3px solid var(--primary-blue);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
        }

        .stylish-name {
            font-family: 'Syncopate', sans-serif; font-size: 1.6rem; letter-spacing: 4px; margin-bottom: 25px;
        }

        .btn-container { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .contact-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 15px; border-radius: 12px; color: white; font-weight: 700;
            text-decoration: none; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .facebook { background: #1877F2; }
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .whatsapp { background: #075E54; }
        .telegram { background: #0088cc; }
        
        .wallet-btn {
            background: linear-gradient(90deg, #6366f1, #3b82f6);
            cursor: pointer; width: 100%; margin-top: 5px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .modal {
            display: none; position: fixed; inset: 0; 
            background: rgba(2, 6, 23, 0.95); z-index: 100;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #0f172a; width: 90%; max-width: 320px;
            padding: 25px; border-radius: 20px; border: 1px solid var(--primary-blue);
            text-align: center;
        }

        .step-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; color: #fff; }

        .option-card {
            background: var(--glass-bg); padding: 12px; border-radius: 10px;
            margin-bottom: 10px; cursor: pointer; border: 1px solid var(--glass-border);
            transition: 0.2s;
        }

        .option-card:hover { border-color: var(--primary-blue); background: rgba(59, 130, 246, 0.1); }

        .address-box {
            background: #020617; padding: 15px; border-radius: 10px;
            font-family: monospace; font-size: 0.8rem; word-break: break-all;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px dashed var(--primary-blue); margin-top: 10px;
        }

        .copy-icon { width: 20px; height: 20px; cursor: pointer; fill: var(--primary-blue); }
        
        /* কিউআর কোড বক্স */
        .qr-box {
            margin: 15px auto 5px; width: 140px; height: 140px;
            background: white; padding: 8px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="main-logo">
            <img src="https://i.ibb.co.com/Y409z5jC/logo.png" style="width:100%; height:100%; border-radius:50%;" alt="SR SOHAN">
        </div>

        <h1 class="stylish-name">ᏚR SOHAN</h1>

        <div class="btn-container">
            <a href="https://www.facebook.com/srsohan99ff" class="contact-btn facebook" target="_blank">FACEBOOK</a>

            <div class="row-grid">
                <a href="https://wa.me/8801329365319" class="contact-btn whatsapp" target="_blank">WHATSAPP</a>
                <a href="https://t.me/srsohan99ff" class="contact-btn telegram" target="_blank">TELEGRAM</a>
            </div>

            <div onclick="openWallet()" class="contact-btn wallet-btn">
                <svg style="width:20px; margin-right:10px;" viewBox="0 0 24 24" fill="white"><path d="M21 18v1c0 1.105-.895 2-2 2H5c-1.105 0-2-.895-2-2V5c0-1.105.895-2 2-2h14c1.105 0 2 .895 2 2v1h-9c-1.105 0-2 .895-2 2v8c0 1.105.895 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.828 0-1.5-.672-1.5-1.5s.672-1.5 1.5-1.5 1.5.672 1.5 1.5-.672 1.5-1.5 1.5z"/></svg>
                WALLET ADDRESS
            </div>
        </div>
    </div>

    <div id="walletModal" class="modal">
        <div class="modal-content">
            <div id="step1">
                <h2 class="step-title">SELECT ASSET</h2>
                <div class="option-card" onclick="showStep(2)">USDT</div>
                <div class="option-card" onclick="showAddress('LTC', 'YOUR_LTC_ADDRESS', 'YOUR_LTC_QR_LINK')">LTC (Litecoin)</div>
                <button onclick="closeWallet()" style="margin-top:10px; color:#94a3b8;">Close</button>
            </div>

            <div id="step2" style="display:none;">
                <h2 class="step-title">SELECT NETWORK</h2>
                <div class="option-card" onclick="showAddress('USDT (TRC20)', 'YOUR_USDT_TRC20_ADDRESS', 'YOUR_USDT_QR_LINK')">TRC20</div>
                <button onclick="showStep(1)" style="margin-top:10px; color:#94a3b8;">Back</button>
            </div>

            <div id="finalStep" style="display:none;">
                <h2 class="step-title" id="networkTitle">ADDRESS</h2>
                
                <div class="qr-box">
                    <img id="qrImage" src="" alt="QR Code" style="width: 100%; height: 100%; object-fit: contain;">
                </div>

                <div class="address-box">
                    <span id="addrText">LOADING...</span>
                    <svg class="copy-icon" onclick="copyAddr()" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </div>
                <p id="copyMsg" style="color: #25D366; font-size: 12px; margin-top: 10px; display: none;">Copied to clipboard!</p>
                
                <button onclick="closeWallet()" style="margin-top:20px; background:var(--primary-blue); padding:8px 25px; border-radius:50px;">DONE</button>
            </div>
        </div>
    </div>

    <script>
        function openWallet() { document.getElementById('walletModal').style.display = 'flex'; showStep(1); }
        function closeWallet() { document.getElementById('walletModal').style.display = 'none'; }

        function showStep(step) {
            document.getElementById('step1').style.display = step === 1 ? 'block' : 'none';
            document.getElementById('step2').style.display = step === 2 ? 'block' : 'none';
            document.getElementById('finalStep').style.display = step === 3 ? 'block' : 'none';
        }

        function showAddress(network, address, qrUrl) {
            document.getElementById('networkTitle').innerText = network + " DETAILS";
            document.getElementById('addrText').innerText = address;
            document.getElementById('qrImage').src = qrUrl; // কিউআর ইমেজ সেট করা হচ্ছে
            showStep(3);
        }

        function copyAddr() {
            const text = document.getElementById('addrText').innerText;
            navigator.clipboard.writeText(text);
            const msg = document.getElementById('copyMsg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
