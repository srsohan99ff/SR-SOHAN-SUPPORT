<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᏚR SOHAN - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Rajdhani', sans-serif;
            color: #f9fafb;
        }
        
        .main-container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .main-logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #1e293b;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            margin: 0 auto 30px;
        }
        
        .main-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stylish-name {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .dev-tag {
            font-size: 0.9rem;
            color: #94a3b8;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 4px 15px;
            border-radius: 50px;
            margin-bottom: 30px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-family: 'Syncopate', sans-serif;
            font-size: 11px;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* আইকন এবং লোগো স্টাইল */
        .btn-icon {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            fill: white;
        }

        .full-width-btn {
            padding: 18px;
            font-size: 16px;
            letter-spacing: 2px;
            grid-column: span 2;
        }

        /* নতুন বিষয়ভিত্তিক বাটন কালার */
        .subject-btn { background: linear-gradient(45deg, #475569, #1e293b); border: 1px solid rgba(255,255,255,0.1); }
        
        /* আগের বাটন কালার */
        .facebook { background: linear-gradient(45deg, #1d4ed8, #3b82f6); }
        .whatsapp { background: linear-gradient(45deg, #059669, #10b981); }
        .telegram { background: linear-gradient(135deg, #0088cc, #006699); }

        .contact-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
