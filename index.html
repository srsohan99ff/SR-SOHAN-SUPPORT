<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᏚR SOHAN - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #3b82f6;
            --dark-bg: #020617;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Rajdhani', sans-serif;
            color: #f9fafb;
        }
        
        .main-container { width: 100%; max-width: 400px; text-align: center; }

        .main-logo {
            width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px;
            border: 3px solid var(--primary-blue);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
        }

        .stylish-name {
            font-family: 'Syncopate', sans-serif; font-size: 1.6rem; letter-spacing: 4px; margin-bottom: 25px;
        }

        .btn-container { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .contact-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 15px; border-radius: 12px; color: white; font-weight: 700;
            text-decoration: none; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .facebook { background: #1877F2; }
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .whatsapp { background: #075E54; }
        .telegram { background: #0088cc; }
        
        .wallet-btn {
            background: linear-gradient(90deg, #6366f1, #3b82f6);
            cursor: pointer; width: 100%; margin-top: 5px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        /* মেইন ওয়ালেট মডাল (Cryptomus Style) */
        .modal {
            display: none; position: fixed; inset: 0; 
            background: rgba(0, 0, 0, 0.6); z-index: 100;
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #ffffff; width: 100%; max-width: 360px;
            padding: 24px; border-radius: 24px; text-align: center;
            color: #1e293b; position: relative; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }

        /* ক্রিপ্টোরেট কাস্টম সিলেক্টর বাটন */
        .crypto-selector {
            width: 100%; background: #f8fafc; border: 1px solid #e2e8f0;
            padding: 14px 16px; border-radius: 14px; display: flex;
            align-items: center; justify-content: space-between;
            font-weight: 600; font-size: 1rem; cursor: pointer; margin-bottom: 16px;
        }

        /* বটম শিট পপআপ স্টাইল */
        .bottom-sheet {
            display: none; position: absolute; bottom: 0; left: 0; right: 0;
            background: #ffffff; border-radius: 24px 24px 0 0;
            padding: 20px; box-shadow: 0 -10px 25px rgba(0,0,0,0.15);
            z-index: 110; text-align: left; max-height: 80vh; overflow-y: auto;
        }

        .sheet-item {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .sheet-item:hover { background: #f1f5f9; }

        /* স্পিনার বা লোডিং অ্যানিমেশন */
        .spinner {
            width: 24px; height: 24px; border: 3px solid #e2e8f0;
            border-top-color: #000; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* কপি ও ফুল কিউআর বক্স */
        .crypto-box {
            background: #f8fafc; padding: 14px; border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            font-family: monospace; font-size: 0.85rem; border: 1px solid #e2e8f0; text-align: left;
        }

        /* ভিডিওর নিচের সোশ্যাল আইকন বাটন */
        .footer-social-btn {
            width: 40px; height: 40px; background: #000000; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: #ffffff; transition: 0.3s;
        }
        .footer-social-btn:hover { transform: scale(1.1); }

        .logo-icon { width: 20px; height: 20px; fill: currentColor; }
        
        /* কাস্টম সুইট অ্যালার্ট ডার্ক টোস্ট */
        .swal2-toast-success {
            background: #1e293b !important; color: #ffffff !important; border-left: 4px solid #22c55e !important;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="main-logo">
            <img src="https://i.ibb.co.com/Y409z5jC/logo.png" style="width:100%; height:100%; border-radius:50%;" alt="SR SOHAN">
        </div>

        <h1 class="stylish-name">ᏚR SOHAN</h1>

        <div class="btn-container">
            <a href="https://www.facebook.com/srsohan99ff" class="contact-btn facebook" target="_blank">
                <svg class="logo-icon" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                &nbsp;FACEBOOK
            </a>

            <div class="row-grid">
                <a href="https://wa.me/8801329365319" class="contact-btn whatsapp" target="_blank">
                    <svg class="logo-icon" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.917-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
                    &nbsp;WHATSAPP
                </a>
                <a href="https://t.me/srsohan99ff" class="contact-btn telegram" target="_blank">
                    <svg class="logo-icon" viewBox="0 0 24 24"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm5.891 8.146l-2.003 9.442c-.149.659-.539.822-1.091.511l-3.051-2.25-1.47 1.417c-.163.163-.299.299-.614.299l.219-3.102 5.645-5.099c.245-.218-.054-.339-.379-.122l-6.979 4.394-3.006-.941c-.654-.204-.667-.654.137-.967l11.741-4.524c.544-.204 1.02.122.861.841z"/></svg>
                    &nbsp;TELEGRAM
                </a>
            </div>

            <div onclick="openWallet()" class="contact-btn wallet-btn">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="white"><path d="M21 18v1c0 1.105-.895 2-2 2H5c-1.105 0-2-.895-2-2V5c0-1.105.895-2 2-2h14c1.105 0 2 .895 2 2v1h-9c-1.105 0-2 .895-2 2v8c0 1.105.895 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.828 0-1.5-.672-1.5-1.5s.672-1.5 1.5-1.5 1.5.672 1.5 1.5-.672 1.5-1.5 1.5z"/></svg>
                &nbsp;WALLET ADDRESS
            </div>
        </div>
    </div>

    <div id="walletModal" class="modal">
        <div class="modal-content">
            <button onclick="closeWallet()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl font-bold">✕</button>
            
            <div id="mainForm">
                <h2 class="text-xl font-bold mb-6 text-left">10 USD</h2>
                
                <label class="block text-left text-sm font-semibold text-gray-500 mb-1">Currency</label>
                <div id="assetBtn" class="crypto-selector" onclick="openSheet('assetSheet')">
                    <span id="selectedAsset">Select currency</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </div>

                <label class="block text-left text-sm font-semibold text-gray-500 mb-1">Network</label>
                <div id="networkBtn" class="crypto-selector opacity-50 cursor-not-allowed" style="pointer-events: none;">
                    <span id="selectedNetwork">Select network</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </div>

                <button id="proceedBtn" onclick="startLoading()" class="w-full bg-gray-200 text-gray-400 font-bold py-3 rounded-xl mt-4 transition duration-300" disabled style="cursor: not-allowed;">
                    Proceed to the payment
                </button>
            </div>

            <div id="loadingArea" style="display: none;" class="py-12">
                <div class="spinner"></div>
            </div>

            <div id="detailsArea" style="display: none;" class="text-left animate-fade-in">
                <h3 class="text-sm font-semibold text-gray-500 mb-1">Recipient's wallet address</h3>
                <div class="crypto-box mb-4">
                    <span id="addrText" class="text-gray-800 break-all pr-2">LOADING...</span>
                    <div class="flex gap-2">
                        <svg onclick="copyAddr()" class="w-5 h-5 text-blue-500 cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                        <svg onclick="viewQR()" class="w-5 h-5 text-gray-700 cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m0 11v1m0-6h.01M12 12h.01M16 12h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                </div>

                <h3 class="text-sm font-semibold text-gray-500 mb-1">Amount</h3>
                <div class="crypto-box mb-6 font-bold text-gray-800">
                    <span>10 USD</span>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-gray-100 flex justify-center gap-4">
                <a href="https://t.me/srsohan99ff" target="_blank" class="footer-social-btn">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm5.891 8.146l-2.003 9.442c-.149.659-.539.822-1.091.511l-3.051-2.25-1.47 1.417c-.163.163-.299.299-.614.299l.219-3.102 5.645-5.099c.245-.218-.054-.339-.379-.122l-6.979 4.394-3.006-.941c-.654-.204-.667-.654.137-.967l11.741-4.524c.544-.204 1.02.122.861.841z"/></svg>
                </a>
                <a href="mailto:your_email@gmail.com" class="footer-social-btn">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L22 8m-9 11h.01M21 16V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2h14a2 2 0 002-2z"/></svg>
                </a>
            </div>

            <div id="assetSheet" class="bottom-sheet">
                <h3 class="text-gray-400 font-bold mb-4">Currency</h3>
                <div class="sheet-item" onclick="selectAsset('USDT', 'https://cryptologos.cc/logos/tether-usdt-logo.png')">
                    <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="w-6 h-6" alt="USDT"> USDT
                </div>
                <div class="sheet-item" onclick="selectAsset('LTC', 'https://cryptologos.cc/logos/litecoin-ltc-logo.png')">
                    <img src="https://cryptologos.cc/logos/litecoin-ltc-logo.png" class="w-6 h-6" alt="LTC"> LTC
                </div>
            </div>

            <div id="networkSheet" class="bottom-sheet">
                <h3 class="text-gray-400 font-bold mb-4">Select network</h3>
                <div id="networkOptions"></div>
            </div>

        </div>
    </div>

    <script>
        // তোমার ক্রিপ্টো ওয়ালেট ডাটাবেস
        const walletData = {
            USDT: [
                { name: "BSC (BEP-20)", address: "YOUR_USDT_BEP20_ADDRESS", qr: "YOUR_USDT_BEP20_QR_LINK" },
                { name: "TRON (TRC-20)", address: "YOUR_USDT_TRC20_ADDRESS", qr: "YOUR_USDT_TRC20_QR_LINK" }
            ],
            LTC: [
                { name: "Litecoin Network", address: "YOUR_LTC_ADDRESS", qr: "YOUR_LTC_QR_LINK" }
            ]
        };

        let pickedAsset = "";
        let pickedAddress = "";
        let pickedQR = "";

        function openWallet() { 
            document.getElementById('walletModal').style.display = 'flex'; 
            resetForm();
        }
        function closeWallet() { 
            document.getElementById('walletModal').style.display = 'none'; 
            closeAllSheets();
        }

        function openSheet(id) {
            closeAllSheets();
            document.getElementById(id).style.display = 'block';
        }
        function closeAllSheets() {
            document.querySelectorAll('.bottom-sheet').forEach(s => s.style.display = 'none');
        }

        // কারেন্সি চুজ করা
        function selectAsset(asset, logoUrl) {
            pickedAsset = asset;
            document.getElementById('selectedAsset').innerHTML = `<img src="${logoUrl}" class="w-5 h-5 inline mr-2"> ${asset}`;
            closeAllSheets();

            // নেটওয়ার্ক বাটন সচল করা
            const netBtn = document.getElementById('networkBtn');
            netBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            netBtn.style.pointerEvents = 'auto';
            document.getElementById('selectedNetwork').innerText = "Select network";

            // নেটওয়ার্ক অপশনগুলো ডাইনামিক লোড করা
            const netOptionsBox = document.getElementById('networkOptions');
            netOptionsBox.innerHTML = "";
            walletData[asset].forEach(net => {
                const div = document.createElement('div');
                div.className = "sheet-item";
                div.innerText = net.name;
                div.onclick = function() { selectNetwork(net.name, net.address, net.qr); };
                netOptionsBox.appendChild(div);
            });

            // প্রোসিড বাটন ডিজেবল রাখা
            disableProceedBtn();
        }

        // নেটওয়ার্ক চুজ করা
        function selectNetwork(name, addr, qrLink) {
            document.getElementById('selectedNetwork').innerText = name;
            pickedAddress = addr;
            pickedQR = qrLink;
            closeAllSheets();

            // প্রোসিড বাটন অন করা (ভিডিওর মতো ব্ল্যাক স্টাইল)
            const proceedBtn = document.getElementById('proceedBtn');
            proceedBtn.disabled = false;
            proceedBtn.style.cursor = 'pointer';
            proceedBtn.classList.remove('bg-gray-200', 'text-gray-400');
            proceedBtn.classList.add('bg-black', 'text-white');
        }

        function disableProceedBtn() {
            const proceedBtn = document.getElementById('proceedBtn');
            proceedBtn.disabled = true;
            proceedBtn.style.cursor = 'not-allowed';
            proceedBtn.classList.add('bg-gray-200', 'text-gray-400');
            proceedBtn.classList.remove('bg-black', 'text-white');
        }

        // ভিডিওর মতো ৩ সেকেন্ড লোডিং স্পিনার চলা
        function startLoading() {
            document.getElementById('mainForm').style.display = 'none';
            document.getElementById('loadingArea').style.display = 'block';

            setTimeout(() => {
                document.getElementById('loadingArea').style.display = 'none';
                document.getElementById('addrText').innerText = pickedAddress;
                document.getElementById('detailsArea').style.display = 'block';
            }, 1500); // ১.৫ সেকেন্ড লোড হবে
        }

        // সুইট পপআপ দিয়ে অ্যাড্রেস কপি করা
        function copyAddr() {
            navigator.clipboard.writeText(pickedAddress);
            Swal.fire({
                toast: true,
                position: 'top',
                icon: 'success',
                title: 'Address was copied',
                showConfirmButton: false,
                timer: 2000,
                timerProgressBar: true,
                customClass: { popup: 'swal2-toast-success' }
            });
        }

        // আলাদাভাবে কিউআর কোড ভিউ করার চমৎকার পপআপ
        function viewQR() {
            Swal.fire({
                title: 'Scan to send payment',
                imageUrl: pickedQR,
                imageWidth: 200,
                imageHeight: 200,
                imageAlt: 'QR Code',
                confirmButtonText: 'Close',
                confirmButtonColor: '#000000'
            });
        }

        function resetForm() {
            document.getElementById('mainForm').style.display = 'block';
            document.getElementById('detailsArea').style.display = 'none';
            document.getElementById('loadingArea').style.display = 'none';
            document.getElementById('selectedAsset').innerText = "Select currency";
            document.getElementById('selectedNetwork').innerText = "Select network";
            document.getElementById('networkBtn').style.pointerEvents = 'none';
            document.getElementById('networkBtn').classList.add('opacity-50', 'cursor-not-allowed');
            disableProceedBtn();
        }
    </script>
</body>
</html>
