<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᏚR SOHAN - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #3b82f6;
            --dark-bg: #020617;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Rajdhani', sans-serif;
            color: #f9fafb;
            overflow-x: hidden;
        }
        
        .main-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
        }

        .main-logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .main-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--primary-blue);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
            position: relative;
            z-index: 2;
        }
        
        .main-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: var(--primary-blue);
            filter: blur(40px);
            opacity: 0.3;
            border-radius: 50%;
        }

        .stylish-name {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .dev-tag {
            font-size: 0.85rem;
            color: #94a3b8;
            background: var(--glass-bg);
            padding: 6px 18px;
            border-radius: 50px;
            margin-bottom: 35px;
            display: inline-block;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }

        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .btn-icon {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            fill: currentColor;
        }

        /* সাবজেক্ট বাটন - ব্লু গ্রেডিয়েন্ট */
        .subject-btn {
            background: linear-gradient(90deg, #1e293b, #334155);
        }

        /* স্পেশাল ব্লু থিম বাটন */
        .full-width-blue {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            grid-column: span 2;
        }

        /* সোশাল মিডিয়া বাটন */
        .facebook { background: #1877F2; }
        .whatsapp { background: #075E54; }
        .telegram { background: #0088cc; }

        .contact-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* পপআপ স্টাইল */
        #contactPopup {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .popup-content {
            background: #0f172a;
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            max-width: 300px;
            border: 1px solid var(--primary-blue);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body>
